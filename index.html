<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InstaPrep</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: rgba(255,255,255,0.08);
  --text: #e5e5e5;
  --text-muted: #888;
  --accent1: #f97316;
  --accent2: #ec4899;
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'DM Sans', sans-serif;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #eaeaea;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a1a;
  --text-muted: #666;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
[data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }

/* Glass card */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* Layout */
.app-container {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 360px;
  min-width: 300px;
  max-width: 600px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: 100vh;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  flex-shrink: 0;
}

.sidebar-resize-handle {
  position: absolute;
  top: 0;
  right: -3px;
  width: 6px;
  height: 100%;
  cursor: col-resize;
  z-index: 100;
  background: transparent;
  transition: background 0.15s;
}

.sidebar-resize-handle:hover,
.sidebar-resize-handle.active {
  background: var(--accent1);
}

.main-area {
  flex: 1;
  min-width: 0;
  padding: 24px;
  overflow-y: auto;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.header-logo {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.2;
}

.header p {
  font-size: 12px;
  color: var(--text-muted);
}

/* Drop Zone */
.dropzone-row { display: flex; gap: 12px; }
.dropzone-row > div { flex: 1; }

.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.dropzone:hover, .dropzone.drag-over {
  border-color: var(--accent1);
  background: rgba(249, 115, 22, 0.05);
}

.dropzone.has-image {
  border-style: solid;
  border-color: var(--border);
  padding: 0;
}

.dropzone .thumb {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: calc(var(--radius-sm) - 2px);
}

.dropzone .icon { font-size: 28px; opacity: 0.5; }
.dropzone .label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.dropzone .sublabel { font-size: 10px; color: var(--text-muted); opacity: 0.6; }
.dropzone-filename {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
  padding: 4px 6px 0;
  font-family: 'JetBrains Mono', monospace;
}

.dropzone .remove-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: none;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

/* Section */
.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 8px;
}

/* EXIF display */
.exif-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.exif-field label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-weight: 500;
}

.exif-field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  transition: border-color 0.2s;
}

.exif-field input:focus {
  border-color: var(--accent1);
}

/* Accordion */
.accordion { border-radius: var(--radius-sm); overflow: hidden; }

.accordion-header {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font);
  transition: background 0.2s;
}

.accordion-header:hover { background: var(--surface2); }

.accordion-header .arrow {
  transition: transform 0.2s;
  font-size: 10px;
  opacity: 0.5;
}
.accordion-header.open .arrow { transform: rotate(180deg); }

.accordion-body {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  margin-top: -10px;
  padding-top: 20px;
}

/* Controls */
.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.control-row label {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  font-weight: 500;
  flex-shrink: 0;
}

.control-row select,
.control-row input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  min-width: 0;
  flex-shrink: 1;
}

.control-row select { max-width: 160px; }

.control-row input[type="range"] {
  flex: 1;
  min-width: 80px;
  accent-color: var(--accent1);
}

.control-row input[type="color"] {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: none;
  cursor: pointer;
  padding: 2px;
}

.range-value {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  min-width: 44px;
  text-align: right;
  flex-shrink: 0;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox-row input[type="checkbox"] {
  accent-color: var(--accent1);
  width: 16px;
  height: 16px;
}

.checkbox-row label {
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
}

/* Radio group for aspect ratio */
.ratio-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.ratio-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}

.ratio-btn.active {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
  border-color: transparent;
}

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--surface);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
  min-width: 0;
}

.tab-btn {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
  white-space: nowrap;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tab-btn.active {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
}

.tab-btn:not(.active):hover {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

.tab-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Canvas preview */
.canvas-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 300px;
  position: relative;
}

.canvas-wrapper canvas {
  max-width: 100%;
  max-height: calc(100vh - 200px);
  object-fit: contain;
  display: block;
}

.canvas-placeholder {
  text-align: center;
  color: var(--text-muted);
  padding: 40px;
}

.canvas-placeholder .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
.canvas-placeholder p { font-size: 14px; }

/* Download button */
.download-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: opacity 0.2s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.download-btn:hover { opacity: 0.9; }
.download-btn:active { transform: scale(0.98); }
.download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Multi-download */
.multi-download-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.multi-download-toggle {
  background: var(--surface2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  font-size: 13px !important;
}

.multi-download-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.multi-dir-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.multi-dir-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  transition: all 0.15s;
  user-select: none;
}

.multi-dir-item:hover {
  border-color: var(--accent1);
  color: var(--text);
}

.multi-dir-item.selected {
  border-color: var(--accent1);
  background: rgba(249,115,22,0.1);
  color: var(--text);
}

.multi-dir-item input[type="checkbox"] {
  accent-color: var(--accent1);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.multi-preview-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0;
}

.multi-preview-item {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.multi-preview-item img {
  width: 120px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.multi-preview-item span {
  font-size: 9px;
  color: var(--text-muted);
  text-align: center;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Notification */
.notification {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 13px;
  color: var(--text);
  z-index: 1000;
  animation: slideIn 0.3s ease;
  backdrop-filter: blur(20px);
}

@keyframes slideIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Templates */
.template-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.template-orientation-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  padding: 3px;
  border-radius: 8px;
}

.template-orientation-tabs button {
  flex: 1;
  padding: 6px 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
}

.template-orientation-tabs button.active {
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
}

.template-save-row {
  display: flex;
  gap: 6px;
}

.template-save-row input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
}

.template-save-row input:focus { border-color: var(--accent1); }

.template-save-row button {
  padding: 7px 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  white-space: nowrap;
}

.template-save-row button:disabled { opacity: 0.4; cursor: not-allowed; }

.template-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 180px;
  overflow-y: auto;
}

.template-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}

.template-item:hover { border-color: var(--accent1); background: rgba(249,115,22,0.06); }

.template-item-name {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.template-item-delete {
  width: 22px;
  height: 22px;
  border: none;
  border-radius: 6px;
  background: rgba(239,68,68,0.15);
  color: #ef4444;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.template-item-delete:hover { background: rgba(239,68,68,0.3); }

.template-empty {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding: 12px 0;
  opacity: 0.6;
}

/* Responsive */
@media (max-width: 900px) {
  .app-container {
    flex-direction: column;
  }
  .sidebar {
    width: 100%;
    min-width: unset;
    max-width: unset;
    max-height: unset;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-resize-handle {
    display: none;
  }
  .main-area {
    max-height: unset;
  }
  .canvas-wrapper canvas {
    max-height: 60vh;
  }
}

/* Toggle Switch */
.toggle-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toggle-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.toggle-btn:hover {
  border-color: var(--accent1);
  color: var(--text);
}

.toggle-btn .toggle-icon {
  font-size: 14px;
  line-height: 1;
}

a.toggle-btn {
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

// ─── LocalStorage Helpers ──────────────────────────────────
const STORAGE_KEY = 'instaprep_settings';
const TEMPLATES_KEY = 'instaprep_templates';
const PRESETS_KEY = 'instaprep_presets';

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function saveSettings(state) {
  try {
    const toSave = {
      overlay: state.overlay,
      frame: state.frame,
      beforeAfter: state.beforeAfter,
      exportSettings: state.exportSettings
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch {}
}

function loadTemplates() {
  try {
    const raw = localStorage.getItem(TEMPLATES_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { portrait: {}, landscape: {} };
}

function saveTemplates(templates) {
  try { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates)); } catch {}
}

function extractSettingsForTemplate(state) {
  return {
    overlay: { ...state.overlay },
    frame: { ...state.frame },
    beforeAfter: { ...state.beforeAfter },
    exportSettings: { ...state.exportSettings }
  };
}

function loadPresets() {
  try {
    const raw = localStorage.getItem(PRESETS_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return {};
}

function savePresetsToStorage(presets) {
  try { localStorage.setItem(PRESETS_KEY, JSON.stringify(presets)); } catch {}
}

function downloadPresetFile(name, settings) {
  const payload = { name, version: 1, app: 'InstaPrep', settings };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `instaprep_preset_${name.replace(/\s+/g, '_').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function reducer(state, action) {
  switch (action.type) {
    case 'SET_UNEDITED':
      return { ...state, uneditedFile: action.file, uneditedImage: action.image, uneditedThumb: action.thumb };
    case 'SET_EDITED':
      return { ...state, editedFile: action.file, editedImage: action.image, editedThumb: action.thumb };
    case 'REMOVE_UNEDITED':
      return { ...state, uneditedFile: null, uneditedImage: null, uneditedThumb: null, exif: initialState.exif, exifError: null };
    case 'REMOVE_EDITED':
      return { ...state, editedFile: null, editedImage: null, editedThumb: null };
    case 'SET_EXIF':
      return { ...state, exif: { ...state.exif, ...action.data }, exifLoading: false, exifError: null };
    case 'SET_EXIF_LOADING':
      return { ...state, exifLoading: true, exifError: null };
    case 'SET_EXIF_ERROR':
      return { ...state, exifLoading: false, exifError: action.error };
    case 'UPDATE_EXIF_FIELD':
      return { ...state, exif: { ...state.exif, [action.field]: action.value } };
    case 'SET_TAB':
      return { ...state, activeTab: action.tab };
    case 'UPDATE_OVERLAY':
      return { ...state, overlay: { ...state.overlay, ...action.data } };
    case 'UPDATE_FRAME':
      return { ...state, frame: { ...state.frame, ...action.data } };
    case 'UPDATE_BEFORE_AFTER':
      return { ...state, beforeAfter: { ...state.beforeAfter, ...action.data } };
    case 'UPDATE_EXPORT':
      return { ...state, exportSettings: { ...state.exportSettings, ...action.data } };
    case 'SAVE_TEMPLATE': {
      const newTemplates = { ...state.templates };
      if (!newTemplates[action.orientation]) newTemplates[action.orientation] = {};
      newTemplates[action.orientation][action.name] = extractSettingsForTemplate(state);
      saveTemplates(newTemplates);
      return { ...state, templates: newTemplates, notification: { key: 'templateSaved', name: `${action.name} (${action.orientation})` } };
    }
    case 'LOAD_TEMPLATE': {
      const tpl = state.templates[action.orientation]?.[action.name];
      if (!tpl) return state;
      return {
        ...state,
        overlay: { ...defaultSettings.overlay, ...tpl.overlay },
        frame: { ...defaultSettings.frame, ...tpl.frame },
        beforeAfter: { ...defaultSettings.beforeAfter, ...tpl.beforeAfter },
        exportSettings: { ...defaultSettings.exportSettings, ...tpl.exportSettings },
        notification: { key: 'templateLoaded', name: `${action.name} (${action.orientation})` }
      };
    }
    case 'DELETE_TEMPLATE': {
      const newTemplates = { ...state.templates };
      if (newTemplates[action.orientation]) {
        const copy = { ...newTemplates[action.orientation] };
        delete copy[action.name];
        newTemplates[action.orientation] = copy;
      }
      saveTemplates(newTemplates);
      return { ...state, templates: newTemplates, notification: { key: 'templateDeleted', name: action.name } };
    }
    case 'SAVE_PRESET': {
      const settings = extractSettingsForTemplate(state);
      const newPresets = { ...state.presets, [action.name]: { ...settings, savedAt: new Date().toISOString() } };
      savePresetsToStorage(newPresets);
      return { ...state, presets: newPresets, notification: { key: 'presetSaved', name: action.name } };
    }
    case 'LOAD_PRESET': {
      const p = state.presets[action.name];
      if (!p) return state;
      return {
        ...state,
        overlay: { ...defaultSettings.overlay, ...p.overlay },
        frame: { ...defaultSettings.frame, ...p.frame },
        beforeAfter: { ...defaultSettings.beforeAfter, ...p.beforeAfter },
        exportSettings: { ...defaultSettings.exportSettings, ...p.exportSettings },
        notification: { key: 'presetLoaded', name: action.name }
      };
    }
    case 'DELETE_PRESET': {
      const newPresets = { ...state.presets };
      delete newPresets[action.name];
      savePresetsToStorage(newPresets);
      return { ...state, presets: newPresets, notification: { key: 'presetDeleted', name: action.name } };
    }
    case 'IMPORT_PRESET': {
      const { name, settings } = action;
      const newPresets = { ...state.presets, [name]: { ...settings, savedAt: new Date().toISOString() } };
      savePresetsToStorage(newPresets);
      return {
        ...state,
        presets: newPresets,
        overlay: { ...defaultSettings.overlay, ...settings.overlay },
        frame: { ...defaultSettings.frame, ...settings.frame },
        beforeAfter: { ...defaultSettings.beforeAfter, ...settings.beforeAfter },
        exportSettings: { ...defaultSettings.exportSettings, ...settings.exportSettings },
        notification: { key: 'presetImported', name }
      };
    }
    case 'NOTIFY':
      return { ...state, notification: action.message };
    case 'CLEAR_NOTIFY':
      return { ...state, notification: null };
    default:
      return state;
  }
}

// ─── Helpers ───────────────────────────────────────────────
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => resolve({ image: img, thumb: url });
    img.onerror = () => reject(new Error('Görsel yüklenemedi'));
    img.src = url;
  });
}

async function parseExif(file) {
  let data;
  try {
    // Try broadest parse first to capture all possible EXIF segments
    data = await exifr.parse(file, true);
  } catch (e1) {
    // Fallback with specific options
    try {
      data = await exifr.parse(file, { tiff: true, exif: true, ifd1: true, xmp: true, iptc: true });
    } catch (e2) {
      throw new Error('EXIF read error: ' + (e2.message || 'unknown'));
    }
  }

  if (!data) {
    return { camera: '', lens: '', iso: '', shutterSpeed: '', aperture: '', focalLength: '', dateTime: '', _empty: true };
  }

  const make = data.Make || '';
  const model = data.Model || '';
  // Avoid duplicate make in model string (e.g. "SONY ILCE-7M3" when Make="SONY")
  const camera = make && model.toLowerCase().startsWith(make.toLowerCase())
    ? model
    : [make, model].filter(Boolean).join(' ');
  const lens = data.LensModel || data.Lens || data.LensInfo || '';
  const iso = (data.ISO || data.ISOSpeedRatings) ? String(data.ISO || data.ISOSpeedRatings) : '';
  const exposureTime = data.ExposureTime;
  const shutterSpeed = exposureTime ? (exposureTime < 1 ? `1/${Math.round(1/exposureTime)}` : `${exposureTime}`) : '';
  const aperture = data.FNumber ? `f/${data.FNumber}` : '';
  const focalLength = data.FocalLength ? `${data.FocalLength}mm` : '';

  // Date extraction
  let dateTime = '';
  const rawDate = data.DateTimeOriginal || data.CreateDate || data.DateTime;
  if (rawDate) {
    try {
      const d = rawDate instanceof Date ? rawDate : new Date(rawDate);
      if (!isNaN(d.getTime())) {
        dateTime = d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
      }
    } catch {}
  }

  const result = { camera: camera.replace(/\s+/g, ' ').trim(), lens: String(lens), iso, shutterSpeed, aperture, focalLength, dateTime };

  // Flag if no useful EXIF field was found
  if (!result.camera && !result.lens && !result.iso && !result.shutterSpeed && !result.aperture && !result.focalLength && !result.dateTime) {
    result._empty = true;
  }

  return result;
}

function getCropRect(imgW, imgH, ratio) {
  if (ratio === 'original') return { sx: 0, sy: 0, sw: imgW, sh: imgH };
  const ratioMap = { '1:1': 1, '4:5': 4/5, '16:9': 16/9, '9:16': 9/16 };
  const target = ratioMap[ratio];
  const imgRatio = imgW / imgH;
  let sw, sh, sx, sy;
  if (imgRatio > target) {
    sh = imgH; sw = Math.round(imgH * target);
    sx = Math.round((imgW - sw) / 2); sy = 0;
  } else {
    sw = imgW; sh = Math.round(imgW / target);
    sx = 0; sy = Math.round((imgH - sh) / 2);
  }
  return { sx, sy, sw, sh };
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── DropZone ──────────────────────────────────────────────
function DropZone({ label, thumb, onFile, onRemove, fileName }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef();
  const t = useT();

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) onFile(file);
  }

  function handleChange(e) {
    const file = e.target.files[0];
    if (file) onFile(file);
    e.target.value = '';
  }

  return (
    <div
      className={`dropzone ${dragOver ? 'drag-over' : ''} ${thumb ? 'has-image' : ''}`}
      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
      onDragLeave={() => setDragOver(false)}
      onDrop={handleDrop}
      onClick={() => !thumb && inputRef.current.click()}
    >
      <input ref={inputRef} type="file" accept="image/*" hidden onChange={handleChange} />
      {thumb ? (
        <>
          <img className="thumb" src={thumb} alt={label} />
          <button className="remove-btn" onClick={e => { e.stopPropagation(); onRemove(); }}>×</button>
        </>
      ) : (
        <>
          <div className="icon">+</div>
          <div className="label">{label}</div>
          <div className="sublabel">{t('dragOrClick')}</div>
        </>
      )}
      {fileName && <div className="dropzone-filename" title={fileName}>{fileName}</div>}
    </div>
  );
}

// ─── Preset Panel ──────────────────────────────────────────
function PresetPanel({ state, dispatch }) {
  const [presetName, setPresetName] = useState('');
  const fileInputRef = useRef();
  const presetNames = Object.keys(state.presets);
  const t = useT();

  function handleSave() {
    const name = presetName.trim();
    if (!name) return;
    dispatch({ type: 'SAVE_PRESET', name });
    setPresetName('');
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.settings || !data.name) {
          dispatch({ type: 'NOTIFY', message: t('invalidPreset') });
          return;
        }
        dispatch({ type: 'IMPORT_PRESET', name: data.name, settings: data.settings });
      } catch {
        dispatch({ type: 'NOTIFY', message: t('presetReadError') });
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function handleExportExisting(name) {
    const p = state.presets[name];
    if (!p) return;
    const { savedAt, ...settings } = p;
    downloadPresetFile(name, settings);
    dispatch({ type: 'NOTIFY', message: `"${name}" ${t('presetDownloaded')}` });
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div className="section-title">{t('presets')}</div>

      {/* Save */}
      <div className="template-save-row">
        <input
          placeholder={t('presetName')}
          value={presetName}
          onChange={e => setPresetName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSave()}
        />
        <button disabled={!presetName.trim()} onClick={handleSave}>{t('save')}</button>
      </div>

      {/* Import */}
      <input ref={fileInputRef} type="file" accept=".json" hidden onChange={handleImport} />
      <button
        onClick={() => fileInputRef.current.click()}
        style={{
          width: '100%',
          padding: '8px 14px',
          border: '1px dashed var(--border)',
          borderRadius: 8,
          background: 'transparent',
          color: 'var(--text-muted)',
          fontSize: 12,
          fontWeight: 600,
          fontFamily: 'var(--font)',
          cursor: 'pointer',
          transition: 'all 0.2s'
        }}
      >
        {t('importFile')}
      </button>

      {/* List */}
      <div className="template-list">
        {presetNames.length === 0 && (
          <div className="template-empty">{t('noPresets')}</div>
        )}
        {presetNames.map(name => (
          <div key={name} className="template-item">
            <div
              className="template-item-name"
              onClick={() => dispatch({ type: 'LOAD_PRESET', name })}
              title={t('clickApply')}
            >
              {name}
            </div>
            <button
              onClick={() => handleExportExisting(name)}
              title={t('downloadFile')}
              style={{
                width: 22, height: 22, border: 'none', borderRadius: 6,
                background: 'rgba(249,115,22,0.15)', color: 'var(--accent1)',
                fontSize: 12, cursor: 'pointer', display: 'flex',
                alignItems: 'center', justifyContent: 'center', flexShrink: 0
              }}
            >
              ⬇
            </button>
            <button
              className="template-item-delete"
              onClick={() => dispatch({ type: 'DELETE_PRESET', name })}
              title={t('deletePreset')}
            >
              ×
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Canvas Preview ────────────────────────────────────────
function CanvasPreview({ state, canvasRef }) {
  const rafRef = useRef(null);
  const timerRef = useRef(null);
  const previewRef = useRef(null);
  const wrapperRef = useRef(null);
  const t = useT();

  const render = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const { activeTab, editedImage, uneditedImage, exif, overlay, frame, beforeAfter, exportSettings } = state;

    const mainImg = editedImage || uneditedImage;
    if (!mainImg) return;

    const crop = getCropRect(mainImg.naturalWidth, mainImg.naturalHeight, exportSettings.aspectRatio);

    // Frame support
    const frameEnabled = frame && frame.enabled;
    const frameSize = frameEnabled ? (frame.size || 60) : 0;
    canvas.width = crop.sw + frameSize * 2;
    canvas.height = crop.sh + frameSize * 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw frame background
    if (frameEnabled) {
      ctx.fillStyle = frame.color || '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if (activeTab === 'overlay') {
      ctx.drawImage(mainImg, crop.sx, crop.sy, crop.sw, crop.sh, frameSize, frameSize, crop.sw, crop.sh);

      // Skip overlay rendering if disabled
      if (overlay.showOverlay === false) return;

      // Build text lines from template
      const templateStr = overlay.textTemplate || '{camera}\n{lens}\nISO {iso}  ·  {shutterSpeed}s  ·  {aperture}  ·  {focalLength}';
      const replacements = {
        camera: exif.camera || '',
        lens: exif.lens || '',
        iso: exif.iso || '',
        shutterSpeed: exif.shutterSpeed || '',
        aperture: exif.aperture || '',
        focalLength: exif.focalLength || '',
        date: exif.dateTime || '',
        custom: exif.custom || ''
      };
      const rawLines = templateStr.split('\n').map(line => {
        let result = line;
        for (const [key, val] of Object.entries(replacements)) {
          result = result.replace(new RegExp('\\{' + key + '\\}', 'g'), val);
        }
        // Clean up leftover separators when values are empty
        result = result.replace(/\s*·\s*·\s*/g, '  ·  ').replace(/^\s*·\s*/, '').replace(/\s*·\s*$/, '').trim();
        return result;
      }).filter(line => line.length > 0);
      const lines = rawLines.length > 0 ? rawLines : [t('noExifInfo')];

      const fontSize = overlay.fontSize;
      const fontStr = `${fontSize}px '${overlay.fontFamily}', sans-serif`;
      ctx.font = fontStr;
      const lineHeight = fontSize * 1.5;
      const pad = overlay.padding;

      // Measure text
      let maxTextW = 0;
      for (const line of lines) {
        const w = ctx.measureText(line).width;
        if (w > maxTextW) maxTextW = w;
      }

      const boxW = maxTextW + pad * 2;
      const boxH = lines.length * lineHeight + pad * 2 - (lineHeight - fontSize);
      const hPos = (overlay.horizontalPosition || 50) / 100;
      const boxX = (canvas.width - boxW) * hPos;
      const boxY = canvas.height * (overlay.verticalPosition / 100) - boxH / 2;

      // Glassmorphism: blur background behind box
      ctx.save();
      roundRect(ctx, boxX, boxY, boxW, boxH, overlay.borderRadius);
      ctx.clip();

      if (overlay.blur > 0) {
        ctx.filter = `blur(${overlay.blur}px)`;
        ctx.drawImage(mainImg, crop.sx, crop.sy, crop.sw, crop.sh, frameSize, frameSize, crop.sw, crop.sh);
        ctx.filter = 'none';
      }

      // Semi-transparent bg
      const r = parseInt(overlay.bgColor.slice(1,3), 16);
      const g = parseInt(overlay.bgColor.slice(3,5), 16);
      const b = parseInt(overlay.bgColor.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${overlay.bgOpacity})`;
      ctx.fillRect(boxX, boxY, boxW, boxH);

      // Border
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      roundRect(ctx, boxX, boxY, boxW, boxH, overlay.borderRadius);
      ctx.stroke();

      ctx.restore();

      // Text
      ctx.font = fontStr;
      ctx.fillStyle = overlay.fontColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const textCenterX = boxX + boxW / 2;
      const textStartY = boxY + pad;
      lines.forEach((line, i) => {
        ctx.fillText(line, textCenterX, textStartY + i * lineHeight);
      });
    }

    else if (activeTab === 'beforeafter') {
      const hasUnedited = !!uneditedImage;
      const hasEdited = !!editedImage;
      if (!hasUnedited && !hasEdited) return;

      const dir = beforeAfter.direction || 'left-right';
      const isDiagonal = ['tl-br', 'tr-bl', 'bl-tr', 'br-tl'].includes(dir);
      const isVertical = dir === 'top-bottom' || dir === 'bottom-top';
      const isReversed = dir === 'right-left' || dir === 'bottom-top' || dir === 'br-tl' || dir === 'bl-tr';

      const beforeImg = uneditedImage || editedImage;
      const afterImg = editedImage || uneditedImage;
      const beforeCrop = getCropRect(beforeImg.naturalWidth, beforeImg.naturalHeight, exportSettings.aspectRatio);
      const afterCrop = getCropRect(afterImg.naturalWidth, afterImg.naturalHeight, exportSettings.aspectRatio);

      canvas.width = afterCrop.sw + frameSize * 2;
      canvas.height = afterCrop.sh + frameSize * 2;
      // Re-draw frame bg for before/after
      if (frameEnabled) {
        ctx.fillStyle = frame.color || '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Translate to inner area so all before/after drawing is frame-aware
      ctx.save();
      if (frameSize > 0) {
        ctx.translate(frameSize, frameSize);
      }
      const W = afterCrop.sw;
      const H = afterCrop.sh;

      if (isDiagonal) {
        // Determine which corners belong to "before" triangle
        // tl-br: before=top-left triangle, after=bottom-right triangle
        // tr-bl: before=top-right triangle, after=bottom-left triangle
        // bl-tr: before=bottom-left triangle (reversed tl-br → after first, before second)
        // br-tl: before=bottom-right triangle (reversed tr-bl → after first, before second)
        const isBackslash = dir === 'tl-br' || dir === 'br-tl'; // \ diagonal
        const diagReversed = dir === 'bl-tr' || dir === 'br-tl';

        const firstImg = diagReversed ? afterImg : beforeImg;
        const secondImg = diagReversed ? beforeImg : afterImg;
        const firstCrop = diagReversed ? afterCrop : beforeCrop;
        const secondCrop = diagReversed ? beforeCrop : afterCrop;

        // First triangle (top-left for \ or top-right for /)
        ctx.save();
        ctx.beginPath();
        if (isBackslash) {
          // \ diagonal: top-left triangle = (0,0), (W,0), (W,H) — above the backslash
          ctx.moveTo(0, 0);
          ctx.lineTo(W, 0);
          ctx.lineTo(W, H);
        } else {
          // / diagonal: top-right triangle = (0,0), (W,0), (0,H) — above the slash
          ctx.moveTo(0, 0);
          ctx.lineTo(W, 0);
          ctx.lineTo(0, H);
        }
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(firstImg, firstCrop.sx, firstCrop.sy, firstCrop.sw, firstCrop.sh, 0, 0, W, H);
        ctx.restore();

        // Second triangle (bottom-right for \ or bottom-left for /)
        ctx.save();
        ctx.beginPath();
        if (isBackslash) {
          // \ diagonal: bottom-right triangle = (0,0), (W,H), (0,H) — below the backslash
          ctx.moveTo(0, 0);
          ctx.lineTo(W, H);
          ctx.lineTo(0, H);
        } else {
          // / diagonal: bottom-left triangle = (W,0), (W,H), (0,H) — below the slash
          ctx.moveTo(W, 0);
          ctx.lineTo(W, H);
          ctx.lineTo(0, H);
        }
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(secondImg, secondCrop.sx, secondCrop.sy, secondCrop.sw, secondCrop.sh, 0, 0, W, H);
        ctx.restore();

        // Diagonal divider
        if (beforeAfter.showDivider) {
          ctx.beginPath();
          if (isBackslash) {
            ctx.moveTo(0, 0);
            ctx.lineTo(W, H);
          } else {
            ctx.moveTo(W, 0);
            ctx.lineTo(0, H);
          }
          ctx.strokeStyle = beforeAfter.dividerColor;
          ctx.lineWidth = beforeAfter.dividerWidth;
          ctx.stroke();
        }

        // Labels for diagonal
        if (beforeAfter.showLabels) {
          const labelFontSize = beforeAfter.labelFontSize > 0 ? beforeAfter.labelFontSize : Math.max(18, Math.round(H * 0.03));
          const labelFontFamily = beforeAfter.labelFontFamily || 'DM Sans';
          const labelPadX = beforeAfter.labelPadding > 0 ? beforeAfter.labelPadding : labelFontSize * 0.8;
          const labelPadY = beforeAfter.labelPadding > 0 ? beforeAfter.labelPadding * 0.5 : labelFontSize * 0.4;
          const labelRadius = beforeAfter.labelBorderRadius != null ? beforeAfter.labelBorderRadius : 8;
          const lbr2 = parseInt((beforeAfter.labelBgColor || '#000000').slice(1,3), 16);
          const lbg2 = parseInt((beforeAfter.labelBgColor || '#000000').slice(3,5), 16);
          const lbb2 = parseInt((beforeAfter.labelBgColor || '#000000').slice(5,7), 16);
          const lbgOpacity = beforeAfter.labelBgOpacity != null ? beforeAfter.labelBgOpacity : 0.55;
          const lbgStyle = `rgba(${lbr2},${lbg2},${lbb2},${lbgOpacity})`;
          const labelColor = beforeAfter.labelTextColor || '#ffffff';
          const labelBlur = beforeAfter.labelBlur || 0;

          function drawLabelDiag(text, cx, cy) {
            if (!text) return;
            ctx.font = `700 ${labelFontSize}px '${labelFontFamily}', sans-serif`;
            const tm = ctx.measureText(text);
            const boxW = tm.width + labelPadX * 2;
            const boxH = labelFontSize + labelPadY * 2;
            const boxX = cx - boxW / 2;
            const boxY2 = cy - boxH / 2;
            ctx.save();
            roundRect(ctx, boxX, boxY2, boxW, boxH, labelRadius);
            ctx.clip();
            if (labelBlur > 0) {
              ctx.filter = `blur(${labelBlur}px)`;
              ctx.drawImage(beforeImg, beforeCrop.sx, beforeCrop.sy, beforeCrop.sw, beforeCrop.sh, 0, 0, W, H);
              ctx.filter = 'none';
            }
            ctx.fillStyle = lbgStyle;
            ctx.fillRect(boxX, boxY2, boxW, boxH);
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1;
            roundRect(ctx, boxX, boxY2, boxW, boxH, labelRadius);
            ctx.stroke();
            ctx.restore();
            ctx.font = `700 ${labelFontSize}px '${labelFontFamily}', sans-serif`;
            ctx.fillStyle = labelColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, boxX + boxW / 2, boxY2 + boxH / 2);
          }

          const beforeText = beforeAfter.beforeLabel || 'BEFORE';
          const afterText = beforeAfter.afterLabel || 'AFTER';

          // Place labels in the centroid of each triangle
          let bCx, bCy, aCx, aCy;
          if (isBackslash) {
            // \ diagonal: first triangle (upper-right) centroid ≈ (2W/3, H/3)
            //             second triangle (lower-left) centroid ≈ (W/3, 2H/3)
            if (diagReversed) {
              aCx = W * 0.67; aCy = H * 0.33;
              bCx = W * 0.33; bCy = H * 0.67;
            } else {
              bCx = W * 0.67; bCy = H * 0.33;
              aCx = W * 0.33; aCy = H * 0.67;
            }
          } else {
            // / diagonal: first triangle (upper-left) centroid ≈ (W/3, H/3)
            //             second triangle (lower-right) centroid ≈ (2W/3, 2H/3)
            if (diagReversed) {
              aCx = W * 0.33; aCy = H * 0.33;
              bCx = W * 0.67; bCy = H * 0.67;
            } else {
              bCx = W * 0.33; bCy = H * 0.33;
              aCx = W * 0.67; aCy = H * 0.67;
            }
          }
          drawLabelDiag(beforeText, bCx, bCy);
          drawLabelDiag(afterText, aCx, aCy);
        }

      } else {
        // Horizontal / Vertical split (existing logic)
        const firstImg = isReversed ? afterImg : beforeImg;
        const secondImg = isReversed ? beforeImg : afterImg;
        const firstCrop = isReversed ? afterCrop : beforeCrop;
        const secondCrop = isReversed ? beforeCrop : afterCrop;

      const splitPos = isVertical
        ? Math.round(H * (beforeAfter.splitRatio / 100))
        : Math.round(W * (beforeAfter.splitRatio / 100));

      // First side
      ctx.save();
      ctx.beginPath();
      if (isVertical) {
        ctx.rect(0, 0, canvas.width, splitPos);
      } else {
        ctx.rect(0, 0, splitPos, canvas.height);
      }
      ctx.clip();
      ctx.drawImage(firstImg, firstCrop.sx, firstCrop.sy, firstCrop.sw, firstCrop.sh, 0, 0, W, H);
      ctx.restore();

      // Second side
      ctx.save();
      ctx.beginPath();
      if (isVertical) {
        ctx.rect(0, splitPos, W, H - splitPos);
      } else {
        ctx.rect(splitPos, 0, W - splitPos, H);
      }
      ctx.clip();
      ctx.drawImage(secondImg, secondCrop.sx, secondCrop.sy, secondCrop.sw, secondCrop.sh, 0, 0, W, H);
      ctx.restore();

      // Divider
      if (beforeAfter.showDivider) {
        ctx.beginPath();
        if (isVertical) {
          ctx.moveTo(0, splitPos);
          ctx.lineTo(canvas.width, splitPos);
        } else {
          ctx.moveTo(splitPos, 0);
          ctx.lineTo(splitPos, canvas.height);
        }
        ctx.strokeStyle = beforeAfter.dividerColor;
        ctx.lineWidth = beforeAfter.dividerWidth;
        ctx.stroke();
      }

      // Labels
      if (beforeAfter.showLabels) {
        const labelFontSize = beforeAfter.labelFontSize > 0 ? beforeAfter.labelFontSize : Math.max(18, Math.round(H * 0.03));
        const labelFontFamily = beforeAfter.labelFontFamily || 'DM Sans';
        ctx.font = `700 ${labelFontSize}px '${labelFontFamily}', sans-serif`;
        const labelPadX = beforeAfter.labelPadding > 0 ? beforeAfter.labelPadding : labelFontSize * 0.8;
        const labelPadY = beforeAfter.labelPadding > 0 ? beforeAfter.labelPadding * 0.5 : labelFontSize * 0.4;
        const labelRadius = beforeAfter.labelBorderRadius != null ? beforeAfter.labelBorderRadius : 8;

        const lbr = parseInt((beforeAfter.labelBgColor || '#000000').slice(1,3), 16);
        const lbg = parseInt((beforeAfter.labelBgColor || '#000000').slice(3,5), 16);
        const lbb = parseInt((beforeAfter.labelBgColor || '#000000').slice(5,7), 16);
        const lbgOpacity = beforeAfter.labelBgOpacity != null ? beforeAfter.labelBgOpacity : 0.55;
        const lbgStyle = `rgba(${lbr},${lbg},${lbb},${lbgOpacity})`;
        const labelColor = beforeAfter.labelTextColor || '#ffffff';
        const labelBlur = beforeAfter.labelBlur || 0;

        const labelVertPct = (beforeAfter.labelVerticalPosition || 90) / 100;

        function drawLabel(text, cx, cy) {
          if (!text) return;
          ctx.font = `700 ${labelFontSize}px '${labelFontFamily}', sans-serif`;
          const tm = ctx.measureText(text);
          const boxW = tm.width + labelPadX * 2;
          const boxH = labelFontSize + labelPadY * 2;
          const boxX = cx - boxW / 2;
          const boxY = cy - boxH / 2;

          ctx.save();
          roundRect(ctx, boxX, boxY, boxW, boxH, labelRadius);
          ctx.clip();

          if (labelBlur > 0) {
            ctx.filter = `blur(${labelBlur}px)`;
            ctx.drawImage(firstImg, firstCrop.sx, firstCrop.sy, firstCrop.sw, firstCrop.sh, 0, 0, W, H);
            ctx.drawImage(secondImg, secondCrop.sx, secondCrop.sy, secondCrop.sw, secondCrop.sh, 0, 0, W, H);
            ctx.filter = 'none';
          }

          ctx.fillStyle = lbgStyle;
          ctx.fillRect(boxX, boxY, boxW, boxH);

          ctx.strokeStyle = 'rgba(255,255,255,0.12)';
          ctx.lineWidth = 1;
          roundRect(ctx, boxX, boxY, boxW, boxH, labelRadius);
          ctx.stroke();
          ctx.restore();

          ctx.font = `700 ${labelFontSize}px '${labelFontFamily}', sans-serif`;
          ctx.fillStyle = labelColor;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, boxX + boxW / 2, boxY + boxH / 2);
        }

        const beforeText = beforeAfter.beforeLabel || 'BEFORE';
        const afterText = beforeAfter.afterLabel || 'AFTER';

        // Compute label positions based on direction
        let beforeCx, beforeCy, afterCx, afterCy;

        if (isVertical) {
          const firstHalfCenterY = splitPos / 2;
          const secondHalfCenterY = splitPos + (H - splitPos) / 2;
          const xPos = W * labelVertPct;

          if (isReversed) {
            // bottom-top: first=after(top), second=before(bottom)
            afterCx = xPos; afterCy = firstHalfCenterY;
            beforeCx = xPos; beforeCy = secondHalfCenterY;
          } else {
            // top-bottom: first=before(top), second=after(bottom)
            beforeCx = xPos; beforeCy = firstHalfCenterY;
            afterCx = xPos; afterCy = secondHalfCenterY;
          }
        } else {
          const firstHalfCenterX = splitPos / 2;
          const secondHalfCenterX = splitPos + (W - splitPos) / 2;
          const yPos = H * labelVertPct;

          if (isReversed) {
            // right-left: first=after(left), second=before(right)
            afterCx = firstHalfCenterX; afterCy = yPos;
            beforeCx = secondHalfCenterX; beforeCy = yPos;
          } else {
            // left-right: first=before(left), second=after(right)
            beforeCx = firstHalfCenterX; beforeCy = yPos;
            afterCx = secondHalfCenterX; afterCy = yPos;
          }
        }

        drawLabel(beforeText, beforeCx, beforeCy);
        drawLabel(afterText, afterCx, afterCy);
      }
      } // end non-diagonal else
      ctx.restore(); // restore translate for frame offset
    }

    else if (activeTab === 'finalphoto') {
      ctx.drawImage(mainImg, crop.sx, crop.sy, crop.sw, crop.sh, frameSize, frameSize, crop.sw, crop.sh);
    }

    // Update visible preview canvas with high-quality downscale
    updatePreview(canvas);
  }, [state]);

  const updatePreview = useCallback(async (srcCanvas) => {
    const preview = previewRef.current;
    const wrapper = wrapperRef.current;
    if (!preview || !wrapper || !srcCanvas || !srcCanvas.width) return;

    const dpr = window.devicePixelRatio || 1;
    const wrapperW = wrapper.clientWidth;
    const wrapperMaxH = window.innerHeight - 200;

    // Calculate display size that fits the wrapper while preserving aspect ratio
    const aspect = srcCanvas.width / srcCanvas.height;
    let dispW = wrapperW;
    let dispH = dispW / aspect;
    if (dispH > wrapperMaxH) {
      dispH = wrapperMaxH;
      dispW = dispH * aspect;
    }

    const pxW = Math.round(dispW * dpr);
    const pxH = Math.round(dispH * dpr);

    preview.style.width = Math.round(dispW) + 'px';
    preview.style.height = Math.round(dispH) + 'px';

    if (preview.width !== pxW || preview.height !== pxH) {
      preview.width = pxW;
      preview.height = pxH;
    }

    const pCtx = preview.getContext('2d', { alpha: false });

    // Use createImageBitmap for Lanczos3 quality downscale
    if (typeof createImageBitmap === 'function') {
      try {
        const bitmap = await createImageBitmap(srcCanvas, {
          resizeWidth: pxW,
          resizeHeight: pxH,
          resizeQuality: 'high'
        });
        pCtx.drawImage(bitmap, 0, 0);
        bitmap.close();
        return;
      } catch (e) {}
    }

    // Fallback
    pCtx.imageSmoothingEnabled = true;
    pCtx.imageSmoothingQuality = 'high';
    pCtx.drawImage(srcCanvas, 0, 0, pxW, pxH);
  }, []);

  useEffect(() => {
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      rafRef.current = requestAnimationFrame(render);
    }, 50);
    return () => {
      clearTimeout(timerRef.current);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [render]);

  const hasImage = state.editedImage || state.uneditedImage;

  if (!hasImage) {
    return (
      <div className="canvas-wrapper">
        <div className="canvas-placeholder">
          <div className="icon">🖼</div>
          <p>{t('uploadToStart')}</p>
        </div>
      </div>
    );
  }

  return (
    <div className="canvas-wrapper" ref={wrapperRef}>
      <canvas ref={canvasRef} style={{ display: 'none' }} />
      <canvas ref={previewRef} />
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, initialState);
  const canvasRef = useRef(null);
  const sidebarRef = useRef(null);
  const [lang, setLang] = useState(() => localStorage.getItem('instaprep_lang') || 'tr');
  const [theme, setTheme] = useState(() => localStorage.getItem('instaprep_theme') || 'dark');
  const [isResizing, setIsResizing] = useState(false);

  const handleResizeStart = useCallback((e) => {
    e.preventDefault();
    setIsResizing(true);
    const startX = e.clientX;
    const startWidth = sidebarRef.current.offsetWidth;

    const onMouseMove = (e) => {
      const newWidth = Math.min(600, Math.max(300, startWidth + (e.clientX - startX)));
      sidebarRef.current.style.width = newWidth + 'px';
    };

    const onMouseUp = () => {
      setIsResizing(false);
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };

    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }, []);

  // Apply theme to document
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('instaprep_theme', theme);
  }, [theme]);

  useEffect(() => {
    localStorage.setItem('instaprep_lang', lang);
    document.documentElement.setAttribute('lang', lang);
  }, [lang]);

  const t = (key) => translations[lang]?.[key] || translations.tr[key] || key;

  // Persist settings to localStorage
  useEffect(() => {
    saveSettings(state);
  }, [state.overlay, state.frame, state.beforeAfter, state.exportSettings]);

  // Resolve notification message
  function resolveNotification(n) {
    if (!n) return null;
    if (typeof n === 'string') return n;
    if (n.key && n.name) return `"${n.name}" ${t(n.key)}`;
    return String(n);
  }

  // EXIF reading
  async function handleUneditedFile(file) {
    try {
      const { image, thumb } = await loadImage(file);
      dispatch({ type: 'SET_UNEDITED', file, image, thumb });
      dispatch({ type: 'SET_EXIF_LOADING' });
      try {
        const exifData = await parseExif(file);
        dispatch({ type: 'SET_EXIF', data: exifData });
        if (exifData._empty) {
          dispatch({ type: 'SET_EXIF_ERROR', error: 'info:' + t('exifNotFound') });
        }
      } catch (err) {
        dispatch({ type: 'SET_EXIF_ERROR', error: err.message || t('exifReadError') });
      }
    } catch (err) {
      dispatch({ type: 'NOTIFY', message: t('imageLoadError') });
    }
  }

  async function handleEditedFile(file) {
    try {
      const { image, thumb } = await loadImage(file);
      dispatch({ type: 'SET_EDITED', file, image, thumb });
    } catch {
      dispatch({ type: 'NOTIFY', message: t('imageLoadError') });
    }
  }

  function getExportDimensions() {
    const canvas = canvasRef.current;
    if (!canvas || !canvas.width) return null;
    const { resizeMode } = state.exportSettings;
    let w = canvas.width, h = canvas.height;
    if (resizeMode === 'width1080' || resizeMode === 'insta') {
      if (w > 1080) {
        const scale = 1080 / w;
        w = 1080;
        h = Math.round(canvas.height * scale);
      }
    }
    return { w, h };
  }

  function getExportFileSize() {
    const canvas = canvasRef.current;
    if (!canvas || !canvas.width) return null;
    try {
      let { format, jpegQuality, resizeMode } = state.exportSettings;
      if (resizeMode === 'insta') { format = 'jpeg'; jpegQuality = 95; }
      const mime = format === 'png' ? 'image/png' : 'image/jpeg';
      const quality = format === 'jpeg' ? jpegQuality / 100 : undefined;

      let src = canvas;
      if (resizeMode === 'width1080' || resizeMode === 'insta') {
        if (canvas.width > 1080) {
          const tW = 1080;
          const tH = Math.round(canvas.height * (1080 / canvas.width));
          const tmp = document.createElement('canvas');
          tmp.width = tW; tmp.height = tH;
          const tCtx = tmp.getContext('2d');
          tCtx.imageSmoothingEnabled = true;
          tCtx.imageSmoothingQuality = 'high';
          tCtx.drawImage(canvas, 0, 0, tW, tH);
          src = tmp;
        }
      }

      const dataUrl = src.toDataURL(mime, quality);
      const bytes = Math.round((dataUrl.length - (dataUrl.indexOf(',') + 1)) * 3 / 4);
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    } catch { return null; }
  }

  async function buildExportCanvas(targetWidth) {
    const canvas = canvasRef.current;
    if (!canvas) return canvas;
    if (!targetWidth || canvas.width <= targetWidth) return canvas;

    const targetH = Math.round(canvas.height * (targetWidth / canvas.width));
    const mainImg = state.editedImage || state.uneditedImage;
    const { activeTab, frame, exportSettings } = state;
    const crop = mainImg ? getCropRect(mainImg.naturalWidth, mainImg.naturalHeight, exportSettings.aspectRatio) : null;
    const frameEnabled = frame && frame.enabled;
    const frameSize = frameEnabled ? (frame.size || 60) : 0;
    const scale = targetWidth / canvas.width;

    // For tabs that only draw a single image (no compositing),
    // build the export canvas directly from the source image
    // to avoid the intermediate full-res canvas decode-encode cycle.
    const isSimpleTab = activeTab === 'finalphoto' || (activeTab === 'overlay' && state.overlay.showOverlay === false);

    if (isSimpleTab && mainImg && crop) {
      const scaledFrame = Math.round(frameSize * scale);
      const innerW = targetWidth - scaledFrame * 2;
      const innerH = targetH - scaledFrame * 2;

      // Use createImageBitmap to crop+resize the original image in one step (Lanczos3 in Chromium)
      if (typeof createImageBitmap === 'function') {
        try {
          const bitmap = await createImageBitmap(mainImg, crop.sx, crop.sy, crop.sw, crop.sh, {
            resizeWidth: innerW,
            resizeHeight: innerH,
            resizeQuality: 'high'
          });
          const result = document.createElement('canvas');
          result.width = targetWidth;
          result.height = targetH;
          const ctx = result.getContext('2d', { alpha: false });
          if (frameEnabled) {
            ctx.fillStyle = frame.color || '#ffffff';
            ctx.fillRect(0, 0, targetWidth, targetH);
          }
          ctx.drawImage(bitmap, scaledFrame, scaledFrame);
          bitmap.close();
          return result;
        } catch (e) {
          // fall through to canvas-based resize
        }
      }
    }

    // Fallback: resize via createImageBitmap on the canvas, or step-down
    if (typeof createImageBitmap === 'function') {
      try {
        const bitmap = await createImageBitmap(canvas, {
          resizeWidth: targetWidth,
          resizeHeight: targetH,
          resizeQuality: 'high'
        });
        const result = document.createElement('canvas');
        result.width = targetWidth;
        result.height = targetH;
        const ctx = result.getContext('2d', { alpha: false });
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();
        return result;
      } catch (e) {
        // fall through
      }
    }

    // Step-down fallback
    let src = canvas;
    let curW = src.width;
    let curH = src.height;
    while (curW / 2 > targetWidth) {
      const halfW = Math.round(curW / 2);
      const halfH = Math.round(curH / 2);
      const step = document.createElement('canvas');
      step.width = halfW;
      step.height = halfH;
      const sCtx = step.getContext('2d');
      sCtx.imageSmoothingEnabled = true;
      sCtx.imageSmoothingQuality = 'high';
      sCtx.drawImage(src, 0, 0, halfW, halfH);
      src = step;
      curW = halfW;
      curH = halfH;
    }
    const final = document.createElement('canvas');
    final.width = targetWidth;
    final.height = targetH;
    const fCtx = final.getContext('2d');
    fCtx.imageSmoothingEnabled = true;
    fCtx.imageSmoothingQuality = 'high';
    fCtx.drawImage(src, 0, 0, targetWidth, targetH);
    return final;
  }

  async function handleDownload() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    let { format, jpegQuality, resizeMode } = state.exportSettings;
    if (resizeMode === 'insta') {
      format = 'jpeg';
      jpegQuality = 95;
    }
    const mime = format === 'png' ? 'image/png' : 'image/jpeg';
    const quality = format === 'jpeg' ? jpegQuality / 100 : undefined;

    let exportCanvas = canvas;
    if (resizeMode === 'width1080' || resizeMode === 'insta') {
      if (canvas.width > 1080) {
        exportCanvas = await buildExportCanvas(1080);
      }
    }

    const dataUrl = exportCanvas.toDataURL(mime, quality);
    const a = document.createElement('a');
    const tabName = state.activeTab === 'overlay' ? 'exif_overlay' : state.activeTab === 'beforeafter' ? 'before_after' : 'final_photo';
    // Use original unedited filename (without extension) as prefix
    let prefix = 'instagram';
    const srcFile = state.uneditedFile || state.editedFile;
    if (srcFile && srcFile.name) {
      prefix = srcFile.name.replace(/\.[^/.]+$/, '');
    }
    a.download = `${prefix}_${tabName}.${format === 'png' ? 'png' : 'jpg'}`;
    a.href = dataUrl;
    a.click();
    dispatch({ type: 'NOTIFY', message: t('photoDownloaded') });
  }

  async function handleCopyToClipboard() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    try {
      let { format, jpegQuality, resizeMode } = state.exportSettings;
      if (resizeMode === 'insta') {
        format = 'jpeg';
        jpegQuality = 95;
      }

      let exportCanvas = canvas;
      if (resizeMode === 'width1080' || resizeMode === 'insta') {
        if (canvas.width > 1080) {
          exportCanvas = await buildExportCanvas(1080);
        }
      }

      const blob = await new Promise(resolve => exportCanvas.toBlob(resolve, 'image/png'));
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
      dispatch({ type: 'NOTIFY', message: t('copiedToClipboard') });
    } catch (err) {
      console.error('Clipboard copy failed:', err);
      dispatch({ type: 'NOTIFY', message: t('copyFailed') });
    }
  }

  // Clear notification
  useEffect(() => {
    if (state.notification) {
      const ti = setTimeout(() => dispatch({ type: 'CLEAR_NOTIFY' }), 3000);
      return () => clearTimeout(ti);
    }
  }, [state.notification]);

  const hasImage = !!(state.editedImage || state.uneditedImage);
  const hasBoth = !!(state.editedImage && state.uneditedImage);

  const canShowTab = {
    overlay: hasImage,
    beforeafter: hasBoth,
    finalphoto: hasImage
  };

  const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');
  const toggleLang = () => setLang(prev => prev === 'tr' ? 'en' : 'tr');

  // ─── Multi-download (Before/After) ─────────────
  const ALL_DIRECTIONS = [
    { value: 'left-right', key: 'dirLR' },
    { value: 'right-left', key: 'dirRL' },
    { value: 'top-bottom', key: 'dirTB' },
    { value: 'bottom-top', key: 'dirBT' },
    { value: 'tl-br', key: 'dirTLBR' },
    { value: 'tr-bl', key: 'dirTRBL' },
    { value: 'bl-tr', key: 'dirBLTR' },
    { value: 'br-tl', key: 'dirBRTL' },
  ];
  const [multiOpen, setMultiOpen] = useState(false);
  const [multiDirs, setMultiDirs] = useState([]);
  const [multiPreviews, setMultiPreviews] = useState([]);
  const [multiDownloading, setMultiDownloading] = useState(false);

  function toggleMultiDir(dir) {
    setMultiDirs(prev => prev.includes(dir) ? prev.filter(d => d !== dir) : [...prev, dir]);
  }

  // Generate previews when multiDirs change
  useEffect(() => {
    if (!hasBoth || multiDirs.length === 0) {
      setMultiPreviews([]);
      return;
    }

    let cancelled = false;
    async function generate() {
      const previews = [];
      const origDir = state.beforeAfter.direction;

      for (const dir of multiDirs) {
        // Temporarily set direction, render to hidden canvas, capture thumbnail
        dispatch({ type: 'UPDATE_BEFORE_AFTER', data: { direction: dir } });
        // Wait for render cycle (RAF + 50ms debounce in CanvasPreview)
        await new Promise(r => setTimeout(r, 120));
        const canvas = canvasRef.current;
        if (canvas && canvas.width && !cancelled) {
          try {
            const thumbW = 200;
            const thumbH = Math.round(canvas.height * (thumbW / canvas.width));
            const bitmap = await createImageBitmap(canvas, { resizeWidth: thumbW, resizeHeight: thumbH, resizeQuality: 'high' });
            const tc = document.createElement('canvas');
            tc.width = thumbW; tc.height = thumbH;
            tc.getContext('2d').drawImage(bitmap, 0, 0);
            bitmap.close();
            previews.push({ dir, dataUrl: tc.toDataURL('image/jpeg', 0.8) });
          } catch {
            previews.push({ dir, dataUrl: null });
          }
        }
      }

      // Restore original direction
      dispatch({ type: 'UPDATE_BEFORE_AFTER', data: { direction: origDir } });

      if (!cancelled) setMultiPreviews(previews);
    }
    generate();
    return () => { cancelled = true; };
  }, [multiDirs, hasBoth]);

  async function handleMultiDownload() {
    if (!hasBoth || multiDirs.length === 0) return;
    setMultiDownloading(true);
    const origDir = state.beforeAfter.direction;
    let { format, jpegQuality, resizeMode } = state.exportSettings;
    if (resizeMode === 'insta') { format = 'jpeg'; jpegQuality = 95; }
    const mime = format === 'png' ? 'image/png' : 'image/jpeg';
    const quality = format === 'jpeg' ? jpegQuality / 100 : undefined;

    let prefix = 'instagram';
    const srcFile = state.uneditedFile || state.editedFile;
    if (srcFile && srcFile.name) prefix = srcFile.name.replace(/\.[^/.]+$/, '');

    for (const dir of multiDirs) {
      dispatch({ type: 'UPDATE_BEFORE_AFTER', data: { direction: dir } });
      await new Promise(r => setTimeout(r, 150));

      const canvas = canvasRef.current;
      if (!canvas) continue;

      let exportCanvas = canvas;
      if (resizeMode === 'width1080' || resizeMode === 'insta') {
        if (canvas.width > 1080) {
          exportCanvas = await buildExportCanvas(1080);
        }
      }

      const dataUrl = exportCanvas.toDataURL(mime, quality);
      const a = document.createElement('a');
      a.download = `${prefix}_before_after_${dir}.${format === 'png' ? 'png' : 'jpg'}`;
      a.href = dataUrl;
      a.click();

      // Small delay between downloads so browser doesn't block them
      await new Promise(r => setTimeout(r, 300));
    }

    dispatch({ type: 'UPDATE_BEFORE_AFTER', data: { direction: origDir } });
    dispatch({ type: 'NOTIFY', message: `${multiDirs.length} ${t('photosDownloaded')}` });
    setMultiDownloading(false);
  }

  return (
    <LangContext.Provider value={lang}>
    <ThemeContext.Provider value={theme}>
    <div className="app-container">
      <div className="sidebar" ref={sidebarRef}>
        <div
          className={`sidebar-resize-handle${isResizing ? ' active' : ''}`}
          onMouseDown={handleResizeStart}
        />
        {/* Header */}
        <div className="header">
          <div className="header-logo">📷</div>
          <div style={{ flex: 1 }}>
            <h1>InstaPrep</h1>
            <p>{t('subtitle')}</p>
          </div>
          <div className="toggle-group">
            <button className="toggle-btn" onClick={toggleTheme} title="Toggle theme">
              <span className="toggle-icon">{theme === 'dark' ? '☀️' : '🌙'}</span>
            </button>
            <button className="toggle-btn" onClick={toggleLang} title="Toggle language">
              {lang === 'tr' ? 'EN' : 'TR'}
            </button>
            <a className="toggle-btn" href="https://github.com/krdmnbrk/instaprep" target="_blank" rel="noopener noreferrer" title="GitHub">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
          </div>
        </div>

        {/* Upload */}
        <div>
          <div className="section-title">{t('photos')}</div>
          <div className="dropzone-row">
            <DropZone
              label={t('unedited')}
              thumb={state.uneditedThumb}
              fileName={state.uneditedFile?.name}
              onFile={handleUneditedFile}
              onRemove={() => dispatch({ type: 'REMOVE_UNEDITED' })}
            />
            <DropZone
              label={t('edited')}
              thumb={state.editedThumb}
              fileName={state.editedFile?.name}
              onFile={handleEditedFile}
              onRemove={() => dispatch({ type: 'REMOVE_EDITED' })}
            />
          </div>
        </div>

        {/* EXIF */}
        <ExifDisplay exif={state.exif} exifLoading={state.exifLoading} exifError={state.exifError} dispatch={dispatch} />

        {/* Settings */}
        <SettingsPanel state={state} dispatch={dispatch} />

        {/* Presets */}
        <PresetPanel state={state} dispatch={dispatch} />
      </div>

      <div className="main-area">
        {/* Tabs */}
        <div className="tab-bar">
          <button className={`tab-btn ${state.activeTab === 'overlay' ? 'active' : ''}`}
            disabled={!canShowTab.overlay}
            onClick={() => dispatch({ type: 'SET_TAB', tab: 'overlay' })}>
            {t('exifOverlay')}
          </button>
          <button className={`tab-btn ${state.activeTab === 'beforeafter' ? 'active' : ''}`}
            disabled={!canShowTab.beforeafter}
            onClick={() => dispatch({ type: 'SET_TAB', tab: 'beforeafter' })}>
            {t('beforeAfter')}
          </button>
          <button className={`tab-btn ${state.activeTab === 'finalphoto' ? 'active' : ''}`}
            disabled={!canShowTab.finalphoto}
            onClick={() => dispatch({ type: 'SET_TAB', tab: 'finalphoto' })}>
            {t('finalPhoto')}
          </button>
        </div>

        {/* Canvas */}
        <CanvasPreview state={state} canvasRef={canvasRef} />

        {/* Export dimensions info */}
        {hasImage && (() => {
          const dims = getExportDimensions();
          if (!dims) return null;
          const mode = state.exportSettings.resizeMode;
          const fileSize = getExportFileSize();
          return (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              fontSize: 12, color: 'var(--text-muted)', padding: '4px 0', flexWrap: 'wrap'
            }}>
              <span>{t('exportDimensions')}: <strong style={{ color: 'var(--text)', fontFamily: "'JetBrains Mono', monospace" }}>{dims.w} × {dims.h}</strong></span>
              {fileSize && <span style={{ fontFamily: "'JetBrains Mono', monospace", opacity: 0.7 }}>·</span>}
              {fileSize && <strong style={{ color: 'var(--text)', fontFamily: "'JetBrains Mono', monospace" }}>{fileSize}</strong>}
              {mode === 'insta' && <span style={{ fontSize: 10, background: 'rgba(249,115,22,0.15)', color: 'var(--accent1)', padding: '2px 8px', borderRadius: 6, fontWeight: 600 }}>IG</span>}
            </div>
          );
        })()}

        {/* Download + Copy */}
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="download-btn" style={{ flex: 1 }} disabled={!hasImage} onClick={handleDownload}>
            ⬇ {t('download')} ({state.exportSettings.format.toUpperCase()}{state.exportSettings.resizeMode === 'insta' ? ' · IG' : ''})
          </button>
          <button
            className="download-btn"
            style={{ flex: 'none', width: 52, padding: '14px 0', background: 'var(--surface2)', color: 'var(--text)', border: '1px solid var(--border)' }}
            disabled={!hasImage}
            onClick={handleCopyToClipboard}
            title={t('copyToClipboard')}
          >
            📋
          </button>
        </div>

        {/* Multi-download for Before/After */}
        {state.activeTab === 'beforeafter' && hasBoth && (
          <div className="multi-download-section">
            <button
              className="download-btn multi-download-toggle"
              onClick={() => setMultiOpen(prev => !prev)}
            >
              {multiOpen ? '▲' : '▼'} {t('downloadMultiple')}
            </button>

            {multiOpen && (
              <div className="multi-download-panel">
                <div className="multi-dir-grid">
                  {ALL_DIRECTIONS.map(d => (
                    <label key={d.value} className={`multi-dir-item ${multiDirs.includes(d.value) ? 'selected' : ''}`}>
                      <input
                        type="checkbox"
                        checked={multiDirs.includes(d.value)}
                        onChange={() => toggleMultiDir(d.value)}
                      />
                      <span>{t(d.key)}</span>
                    </label>
                  ))}
                </div>

                {multiPreviews.length > 0 && (
                  <div className="multi-preview-row">
                    {multiPreviews.map(p => (
                      <div key={p.dir} className="multi-preview-item">
                        {p.dataUrl && <img src={p.dataUrl} alt={p.dir} />}
                        <span>{t(ALL_DIRECTIONS.find(d => d.value === p.dir)?.key || '')}</span>
                      </div>
                    ))}
                  </div>
                )}

                <button
                  className="download-btn"
                  disabled={multiDirs.length === 0 || multiDownloading}
                  onClick={handleMultiDownload}
                  style={{ width: '100%' }}
                >
                  {multiDownloading ? '⏳' : '⬇'} {t('downloadAll')} {multiDirs.length > 0 ? `(${multiDirs.length})` : ''}
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Notification */}
      {state.notification && <div className="notification">{resolveNotification(state.notification)}</div>}
    </div>
    </ThemeContext.Provider>
    </LangContext.Provider>
  );
}

// ─── Mount ─────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
document.fonts.ready.then(() => {
  root.render(<App />);
});
</script>
</body>
</html>
